<html lang="tr">
<head>

<title>Sağlık Takibi</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#000;font-family:'DM Sans',sans-serif;color:#fff;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column}
input,select,button{font-family:'DM Sans',sans-serif}
input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:99px;outline:none;width:100%;background:#444}
input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:99px;background:#444}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;cursor:pointer;background:#fff;margin-top:-10px;box-shadow:0 0 8px rgba(255,255,255,0.4)}
input[type=range]::-moz-range-track{height:6px;border-radius:99px;background:#444;border:none}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#fff;border:none;cursor:pointer}
input,select{-webkit-appearance:none;appearance:none}
::-webkit-scrollbar{width:0;height:0}
.safe-top{padding-top:env(safe-area-inset-top)}
.safe-bot{padding-bottom:env(safe-area-inset-bottom)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 0}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .2s ease}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
.pu{animation:pu 1.4s infinite}
.card{background:#111;border:1px solid #333;border-radius:14px;padding:14px;margin-bottom:11px}
.card-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.inp{width:100%;background:#000;border:1px solid #333;border-radius:10px;padding:11px 12px;color:#fff;font-size:15px;outline:none}
.inp::placeholder{color:#444}
.btn{width:100%;background:#fff;border:none;border-radius:12px;padding:13px;color:#000;font-weight:700;font-size:15px;cursor:pointer}
.btn-outline{background:#000;border:1px solid #fff;color:#fff}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lbl{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px}
.infobox{background:#000;border-radius:10px;padding:11px 8px;text-align:center}
.infobox .val{font-size:17px;font-weight:700}
.infobox .lbl2{font-size:10px;color:#555;margin-top:3px;text-transform:uppercase;letter-spacing:.7px}
.chip{background:#111;border:1px solid #333;border-radius:10px;padding:8px 10px;min-width:74px;flex-shrink:0}
.divider{border:none;border-top:1px solid #222;margin:0}
.tab-btn{flex:1;padding:10px 2px 8px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-top:2px solid transparent;transition:all .15s;min-width:0}
.tab-btn.active{border-top-color:#fff;color:#fff}
.tab-btn:not(.active){color:#555}
.tab-icon{font-size:21px}
.tab-label{font-size:9px;letter-spacing:.4px}
.eg-btn{padding:10px 4px;border-radius:10px;border:1px solid #333;background:#000;color:#fff;cursor:pointer;text-align:center;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px}
.eg-btn.active{border-color:#fff;background:#1a1a1a}
.kat-btn{padding:6px 12px;border-radius:20px;border:1px solid #333;background:#000;color:#666;cursor:pointer;font-size:11px;white-space:nowrap;font-weight:400}
.kat-btn.active{border-color:#fff;background:#1a1a1a;color:#fff;font-weight:700}
.row-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1a1a1a}
.del-btn{background:none;border:none;color:#f44;cursor:pointer;font-size:22px;padding:0 4px;line-height:1}
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.ring-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.8px}
select option{background:#111;color:#fff}
</style>
</head>

// ── HESAPLA ───────────────────────────────────────────────────────────────────
function hesaplaBMI(k,b){
  k=parseFloat(k);b=parseFloat(b);
  if(!k||!b)return null;
  return (k/((b/100)**2)).toFixed(1);
}
function hesaplaYag({cinsiyet,boy,bel,boyun,kalca}){
  const b=parseFloat(boy),bl=parseFloat(bel),bn=parseFloat(boyun),k=parseFloat(kalca);
  if(!b||!bl||!bn)return null;
  if(cinsiyet==="erkek")return(495/(1.0324-0.19077*Math.log10(bl-bn)+0.15456*Math.log10(b))-450).toFixed(1);
  if(!k)return null;
  return(495/(1.29579-0.35004*Math.log10(bl+k-bn)+0.22100*Math.log10(b))-450).toFixed(1);
}
function hesaplaBMR({yas,cinsiyet,kilo,boy}){
  const y=parseFloat(yas),k=parseFloat(kilo),b=parseFloat(boy);
  if(!y||!k||!b)return null;
  return cinsiyet==="erkek"?88.362+13.397*k+4.799*b-5.677*y:447.593+9.247*k+3.098*b-4.330*y;
}

function getSonOlcum(){
  if(state.olcumGecmisi.length===0)return{};
  // En son tarihteki kayıt
  const sorted=[...state.olcumGecmisi].sort((a,b)=>b.tarih.localeCompare(a.tarih));
  return sorted[0];
}

function getDerived(){
  const p=state.profil;
  const o=getSonOlcum();
  // Boy/kilo/bel/boyun/kalca son ölçümden al
  const profilBirlestir={...p, boy:o.boy||p.boy||"", kilo:o.kilo||p.kilo||"", bel:o.bel||p.bel||"", boyun:o.boyun||p.boyun||"", kalca:o.kalca||p.kalca||""};
  const bmi=hesaplaBMI(profilBirlestir.kilo,profilBirlestir.boy);
  const yag=hesaplaYag({...profilBirlestir,cinsiyet:p.cinsiyet});
  const bmr=hesaplaBMR({...profilBirlestir,cinsiyet:p.cinsiyet,yas:p.yas});
  const tdee=bmr?Math.round(bmr*1.55):null;
  const topKal=state.ogunler.reduce((s,o)=>s+o.kalori,0);
  const topPro=state.ogunler.reduce((s,o)=>s+o.protein,0);
  const topKarb=state.ogunler.reduce((s,o)=>s+o.karb,0);
  const topYag=state.ogunler.reduce((s,o)=>s+o.yag,0);
  const topYak=state.antrenmanlar.reduce((s,a)=>s+a.yakilanKalori,0);
  const topUyu=state.uyku.reduce((s,u)=>s+u.sure,0);
  const k=parseFloat(profilBirlestir.kilo)||parseFloat(p.kilo)||0;
  const yo=parseFloat(yag)||0;
  const hYag=parseFloat(state.hedefYag)||(p.cinsiyet==="erkek"?15:22);
  const yakılacak=Math.max(0,(k*yo/100)-(k*hYag/100));
  let gunKalani=0,gerekliAcik=0,hafHiz=0;
  if(state.hedefTarih){
    const bd=new Date();bd.setHours(0,0,0,0);
    const hd=new Date(state.hedefTarih);hd.setHours(0,0,0,0);
    gunKalani=Math.max(0,Math.round((hd-bd)/86400000));
    if(gunKalani>0&&yakılacak>0){
      gerekliAcik=Math.round((yakılacak*7700)/gunKalani);
      hafHiz=parseFloat((yakılacak/(gunKalani/7)).toFixed(2));
    }
  }
  const hedefKcal=tdee?Math.max(tdee-(gerekliAcik||Math.round(tdee*0.15)),p.cinsiyet==="erkek"?1500:1200):1800;
  const adimMesafe=((state.adim*0.78)/1000).toFixed(2);
  const adimKcal=Math.round(state.adim*0.04*(k/70||1));
  return{bmi,yag,bmr,tdee,topKal,topPro,topKarb,topYag,topYak,topUyu,k,yo,hYag,yakılacak,gunKalani,gerekliAcik,hafHiz,hedefKcal,adimMesafe,adimKcal,profil:p};
}

// ── SVG YARDIMCILARI ──────────────────────────────────────────────────────────
function svgRing(val,max,label,color,size=88){
  const r=size*0.4,cx=size/2,cy=size/2;
  const circ=2*Math.PI*r;
  const pct=Math.min(val/max,1);
  return`<div class="ring-wrap">
    <svg width="${size}" height="${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1a1a1a" stroke-width="7"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="7"
        stroke-dasharray="${pct*circ} ${circ}" stroke-linecap="round"
        transform="rotate(-90 ${cx} ${cy})"/>
      <text x="${cx}" y="${cy-4}" text-anchor="middle" fill="#fff" font-size="${size*.16}" font-weight="700" font-family="DM Sans,sans-serif">${val}</text>
      <text x="${cx}" y="${cy+size*.14}" text-anchor="middle" fill="#555" font-size="${size*.1}" font-family="DM Sans,sans-serif">${label}</text>
    </svg>
  </div>`;
}

function svgBMI(bmi){
  const val=Math.min(Math.max(parseFloat(bmi),10),40);
  const pct=((val-10)/30)*100;
  let renk="#4ade80",lbl="Normal";
  if(val<18.5){renk="#60a5fa";lbl="Zayıf";}
  else if(val>=30){renk="#f87171";lbl="Obez";}
  else if(val>=25){renk="#facc15";lbl="Fazla Kilolu";}
  return`<div style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;margin-bottom:7px">
      <span style="color:#888;font-size:13px">BMI</span>
      <span style="color:${renk};font-weight:700;font-size:17px">${bmi} — ${lbl}</span>
    </div>
    <div style="background:#1a1a1a;border-radius:99px;height:10px;overflow:hidden">
      <div style="width:${pct}%;background:linear-gradient(90deg,#60a5fa,${renk});height:100%;border-radius:99px"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:4px">
      ${["10","18.5","25","30","40"].map(v=>`<span style="font-size:9px;color:#444">${v}</span>`).join("")}
    </div>
  </div>`;
}

  if(d.tdee){hdrKal.style.display="block";hdrKcal.textContent=d.hedefKcal;}
  else hdrKal.style.display="none";

  const chips=[
    {label:"Alınan",val:d.topKal,max:d.tdee||2000,unit:"kcal"},

function renderOlcumGrafik(){
  const g=state.olcumGecmisi;
  if(g.length<1)return`
  <div class="card">
    <div class="card-title">📈 İlerleme Grafiği</div>
    <div style="text-align:center;padding:20px 0;color:#555;font-size:13px">Henüz ölçüm yok.<br>Yukarıdan ilk ölçümünü ekle!</div>
  </div>`;

  // Aktif serimler
  const aktif=OLCUMLER.filter(o=>state.olcumAktif[o.key]);
  // Tarihler sıralı
  const tarihler=[...new Set(g.map(r=>r.tarih))].sort();

  // SVG grafik boyutları
  const W=Math.min(window.innerWidth-56,420);
  const H=200;
  const PAD={top:16,right:12,bot:32,left:36};
  const gW=W-PAD.left-PAD.right;
  const gH=H-PAD.top-PAD.bot;

  // Tüm görünen değerler
  let allVals=[];
  aktif.forEach(o=>{
    tarihler.forEach(t=>{
      const r=g.find(x=>x.tarih===t);
      if(r&&r[o.key])allVals.push(parseFloat(r[o.key]));
    });
  });
  if(allVals.length===0)return`
  <div class="card">
    <div class="card-title">📈 İlerleme Grafiği</div>
    <div style="text-align:center;padding:20px 0;color:#555;font-size:13px">Seçili ölçümler için veri yok.</div>
  </div>`;

  const minV=Math.min(...allVals)*0.97;
  const maxV=Math.max(...allVals)*1.03;
  const xStep=tarihler.length>1?gW/(tarihler.length-1):gW/2;

  function xPos(i){return PAD.left+(tarihler.length>1?i*xStep:gW/2);}
  function yPos(v){return PAD.top+gH-(((v-minV)/(maxV-minV))*gH);}

  // Çizgiler
  let lines="";
  let dots="";
  aktif.forEach(o=>{
    const points=tarihler.map((t,i)=>{
      const r=g.find(x=>x.tarih===t);
      if(!r||!r[o.key])return null;
      return{x:xPos(i),y:yPos(parseFloat(r[o.key])),v:r[o.key]};
    }).filter(Boolean);
    if(points.length<1)return;
    if(points.length>=2){
      const d=points.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
      lines+=`<path d="${d}" fill="none" stroke="${o.renk}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>`;
    }
    points.forEach(p=>{
      dots+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="${o.renk}" stroke="#111" stroke-width="2"/>`;
    });
  });

  // X ekseni etiketleri
  const xLabels=tarihler.map((t,i)=>{
    const d=new Date(t);
    const lbl=`${d.getDate()}/${d.getMonth()+1}`;
    return`<text x="${xPos(i).toFixed(1)}" y="${H-6}" text-anchor="middle" fill="#555" font-size="9" font-family="DM Sans,sans-serif">${lbl}</text>`;
  }).join("");

  // Y ekseni etiketleri (3 adet)
  const yLabels=[0,0.5,1].map(f=>{
    const v=(minV+f*(maxV-minV)).toFixed(1);
    const y=(PAD.top+gH-f*gH).toFixed(1);
    return`<text x="${PAD.left-4}" y="${y}" text-anchor="end" fill="#555" font-size="9" font-family="DM Sans,sans-serif" dominant-baseline="middle">${v}</text>
    <line x1="${PAD.left}" y1="${y}" x2="${PAD.left+gW}" y2="${y}" stroke="#1a1a1a" stroke-width="1"/>`;
  }).join("");

  // Son ölçüm özeti
  const sonOlcum=g.filter(x=>x.tarih===tarihler[tarihler.length-1])[0]||{};

  return`
  <div class="card">
    <div class="card-title">📈 İlerleme Grafiği <span style="font-size:10px;color:#555;font-weight:400">(${tarihler.length} kayıt)</span></div>

    <!-- Seri toggle butonları -->
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">
      ${OLCUMLER.map(o=>{
        const ac=state.olcumAktif[o.key];
        return`<button data-toggle-olcum="${o.key}" style="padding:5px 10px;border-radius:20px;border:1px solid ${ac?o.renk:"#333"};background:${ac?o.renk+"22":"#000"};color:${ac?o.renk:"#555"};cursor:pointer;font-size:11px;font-weight:${ac?700:400}">${o.lbl}</button>`;
      }).join("")}
    </div>

    <!-- SVG Grafik -->
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
      <svg width="${W}" height="${H}" style="display:block">
        ${yLabels}
        <line x1="${PAD.left}" y1="${PAD.top}" x2="${PAD.left}" y2="${PAD.top+gH}" stroke="#333" stroke-width="1"/>
        <line x1="${PAD.left}" y1="${PAD.top+gH}" x2="${PAD.left+gW}" y2="${PAD.top+gH}" stroke="#333" stroke-width="1"/>
        ${lines}
        ${dots}
        ${xLabels}
      </svg>
    </div>

    <!-- Son ölçüm değerleri -->
    <div style="margin-top:12px;border-top:1px solid #1a1a1a;padding-top:12px">
      <div style="font-size:11px;color:#555;margin-bottom:8px;text-transform:uppercase;letter-spacing:.8px">Son Ölçüm: ${tarihler[tarihler.length-1]||"—"}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${OLCUMLER.filter(o=>sonOlcum[o.key]).map(o=>`
        <div style="background:#000;border:1px solid ${o.renk}44;border-radius:8px;padding:6px 10px;text-align:center">
          <div style="font-size:13px;font-weight:700;color:${o.renk}">${sonOlcum[o.key]}<span style="font-size:9px;color:#555">${o.unit}</span></div>
          <div style="font-size:9px;color:#555;margin-top:1px">${o.lbl}</div>
        </div>`).join("")}
      </div>
    </div>

    <!-- Kayıt listesi -->
    ${g.length>0?`
    <div style="margin-top:12px;border-top:1px solid #1a1a1a;padding-top:10px">
      <div style="font-size:11px;color:#555;margin-bottom:8px;text-transform:uppercase;letter-spacing:.8px">Tüm Kayıtlar</div>
      ${[...g].sort((a,b)=>b.tarih.localeCompare(a.tarih)).map(r=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #111">
        <div>
          <div style="font-size:12px;font-weight:600">${r.tarih}</div>
          <div style="font-size:11px;color:#555;margin-top:2px">${OLCUMLER.filter(o=>r[o.key]).map(o=>`${o.lbl}: ${r[o.key]}${o.unit}`).join(" · ")}</div>
        </div>
        <button data-del-olcum="${r.id}" style="background:none;border:none;color:#f44;cursor:pointer;font-size:20px;padding:0 4px;line-height:1">×</button>
      </div>`).join("")}
    </div>`:""}
  </div>`;
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
let motionHandler=null;
const stepBuf=[];
let lastAcc={x:0,y:0,z:0};

function detectStep(a){
  const mag=Math.sqrt(a.x*a.x+a.y*a.y+a.z*a.z);
  stepBuf.push(mag);
  if(stepBuf.length>10)stepBuf.shift();
  const avg=stepBuf.reduce((s,v)=>s+v,0)/stepBuf.length;
  const lastMag=Math.sqrt(lastAcc.x**2+lastAcc.y**2+lastAcc.z**2);
  lastAcc=a;
  if(mag>avg+2.5&&lastMag<=avg+2.5){
    state.adim++;
    render();
  }
}

async function sensoreBasla(){
  if(!window.DeviceMotionEvent){state.adimIzin="desteklenmiyor";render();return;}
  if(typeof DeviceMotionEvent.requestPermission==="function"){
    try{
      const p=await DeviceMotionEvent.requestPermission();
      if(p!=="granted"){state.adimIzin="reddedildi";render();return;}
    }catch{state.adimIzin="reddedildi";render();return;}
  }
  state.adimIzin="verildi";state.adimAktif=true;
  motionHandler=(e)=>{const a=e.accelerationIncludingGravity;if(a)detectStep({x:a.x||0,y:a.y||0,z:a.z||0});};
  window.addEventListener("devicemotion",motionHandler);
  render();
}
function sensoriDurdur(){
  if(motionHandler)window.removeEventListener("devicemotion",motionHandler);
  state.adimAktif=false;render();
}

function attachEvents(){
  // Tab bar
  document.querySelectorAll("[data-tab]").forEach(btn=>{
    btn.addEventListener("click",()=>{state.tab=parseInt(btn.dataset.tab);render();});
  });

  // Profil inputlar
  document.querySelectorAll("[data-pkey]").forEach(el=>{
    el.addEventListener("input",()=>{
      state.profil[el.dataset.pkey]=el.value;
      localStorage.setItem("s_profil",JSON.stringify(state.profil));
      // sadece header güncelle (full render flicker olmadan)
      renderHeader(getDerived());
    });
    el.addEventListener("change",()=>{render();});
  });

  // Beslenme arama
  const besArama=document.getElementById("bes-arama");
  if(besArama)besArama.addEventListener("input",e=>{state.arama=e.target.value;render();});

  // Kategori butonları
  document.querySelectorAll("[data-kat]").forEach(btn=>{
    btn.addEventListener("click",()=>{state.katAktif=btn.dataset.kat;state.arama="";render();});
  });

  // Yiyecek seç
  const besSel=document.getElementById("bes-select");
  if(besSel)besSel.addEventListener("change",e=>{state.secYiyecek=e.target.value;render();});

  // Yiyecek ekle
  const btnYekle=document.getElementById("btn-yiyecek-ekle");
  if(btnYekle)btnYekle.addEventListener("click",()=>{
    const liste=state.arama.length>1
      ?[...TUM_YIYECEKLER,...state.ozelBesinler].filter(y=>y.ad.toLowerCase().includes(state.arama.toLowerCase()))
      :state.katAktif==="⭐ Özel"?state.ozelBesinler:(YIYECEKLER[state.katAktif]||[]);
    const g=liste.find(y=>y.ad===state.secYiyecek)||liste[0];
    if(g)state.ogunler.push({...g,id:Date.now()});
    render();
  });

  // Öğün sil
  document.querySelectorAll("[data-del-ogun]").forEach(btn=>{
    btn.addEventListener("click",()=>{state.ogunler=state.ogunler.filter(o=>o.id!=btn.dataset.delOgun);render();});

// ── STREAK HESAPLA ────────────────────────────────────────────────────────────
function hesaplaStreak(){
  const bugun=new Date().toISOString().split("T")[0];
  if(!state.streakGunler.includes(bugun)){
    state.streakGunler.push(bugun);
    localStorage.setItem("s_streak",JSON.stringify(state.streakGunler));
  }
  const sorted=[...new Set(state.streakGunler)].sort();
  let streak=0;
  const now=new Date(); now.setHours(0,0,0,0);
  for(let i=sorted.length-1;i>=0;i--){
    const d=new Date(sorted[i]); d.setHours(0,0,0,0);
    const diff=Math.round((now-d)/86400000);
    if(diff===streak){streak++;} else break;
  }
  return streak;
}

function getRozetler(streak,topYak,topKal,adimToplam){
  const rozetler=[];
  if(streak>=1)rozetler.push({ikon:"🔥",ad:"İlk Adım",ac:"Uygulamayı ilk kez açtın"});
  if(streak>=3)rozetler.push({ikon:"⚡",ad:"3 Gün Seri",ac:"3 gün üst üste giriş"});
  if(streak>=7)rozetler.push({ikon:"🏆",ad:"1 Hafta",ac:"7 gün kesintisiz"});
  if(streak>=30)rozetler.push({ikon:"👑",ad:"1 Ay",ac:"30 gün kesintisiz!"});
  if(topYak>=300)rozetler.push({ikon:"🔥",ad:"Kalori Yakıcı",ac:"300+ kcal yaktın"});
  if(adimToplam>=10000)rozetler.push({ikon:"👟",ad:"10K Adım",ac:"Günlük 10.000 adım!"});
  if(state.olcumGecmisi.length>=3)rozetler.push({ikon:"📏",ad:"Düzenli Takip",ac:"3+ ölçüm kaydı"});
  if(state.fotograflar.length>=1)rozetler.push({ikon:"📸",ad:"İlerlemeyi Belgele",ac:"İlk fotoğraf"});
  if(state.ogunler.length>=3)rozetler.push({ikon:"🥗",ad:"Bilinçli Beslen",ac:"3+ öğün takibi"});
  return rozetler;
}

const GUNLER=["Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi","Pazar"];
const BUGUN_GUN=GUNLER[new Date().getDay()===0?6:new Date().getDay()-1];

function oneriBeslenme(hedefKcal, gun){
  const antGun=state.antProg[gun]?.tip==="antrenman";
  // Makro dağılımı: antrenman günü daha fazla karb
  const protein=Math.round(hedefKcal*(antGun?0.35:0.40)/4);
  const karb=Math.round(hedefKcal*(antGun?0.40:0.30)/4);
  const yag=Math.round(hedefKcal*(antGun?0.25:0.30)/9);

  const sabahKcal=Math.round(hedefKcal*0.25);
  const ogleKcal=Math.round(hedefKcal*0.35);
  const aksamKcal=Math.round(hedefKcal*0.30);
  const araKcal=Math.round(hedefKcal*0.10);

  const oneriSabah=antGun
    ?[`Yulaf ezmesi (80g) — ~300 kcal`,`3 yumurta haşlanmış — ~234 kcal`,`1 muz — ~90 kcal`]
    :[`Greek yoğurt (200g) — ~120 kcal`,`2 yumurta — ~156 kcal`,`Tam buğday ekmek (2 dilim) — ~138 kcal`];
  const oneriOgle=antGun
    ?[`Tavuk göğsü (200g) — ~330 kcal`,`Pirinç (150g pişmiş) — ~195 kcal`,`Salata + zeytinyağı — ~80 kcal`]
    :[`Somon (150g) — ~312 kcal`,`Bulgur (150g pişmiş) — ~125 kcal`,`Brokoli buğulama — ~50 kcal`];
  const oneriAksam=antGun
    ?[`Dana kıyma (150g) — ~375 kcal`,`Patates haşlanmış (200g) — ~174 kcal`,`Sebze sote — ~60 kcal`]
    :[`Hindi göğsü (150g) — ~203 kcal`,`Kinoa (100g pişmiş) — ~120 kcal`,`Izgara sebze — ~80 kcal`];
  const oneriAra=antGun
    ?[`Protein bar — ~200 kcal`,`Badem (30g) — ~173 kcal`]
    :[`Cottage cheese (150g) — ~147 kcal`,`Elma — ~52 kcal`];

  return {protein,karb,yag,sabahKcal,ogleKcal,aksamKcal,araKcal,oneriSabah,oneriOgle,oneriAksam,oneriAra,antGun};
}

const HAZIR_HAREKETLER=["Bench Press","Squat","Deadlift","Overhead Press","Barbell Row","Incline Press","Romanian Deadlift","Hip Thrust","Pull-up","Dumbbell Press"];

function hesapla1RM(agirlik, tekrar){
  const a=parseFloat(agirlik), t=parseInt(tekrar);
  if(!a||!t||t<1)return null;
  if(t===1)return a;
  // Epley formülü
  const epley=a*(1+t/30);
  // Brzycki
  const brzycki=a*(36/(37-t));
  // Lander
  const lander=(100*a)/(101.3-2.67123*t);
  // Ortalama
  return Math.round((epley+brzycki+lander)/3);
}

function yuzdeTablosu(rm){
  return [100,95,90,85,80,75,70,65,60].map(pct=>({pct,agirlik:Math.round(rm*pct/100)}));
}

        <label class="lbl">Ağırlık (kg)</label>
        <input class="inp" id="rm-agirlik" type="number" inputmode="decimal" value="${state.rm_agirlik}" placeholder="örn: 80" style="margin-top:4px"/>
      </div>
      <div>
        <label class="lbl">Tekrar Sayısı</label>
        <input class="inp" id="rm-tekrar" type="number" inputmode="decimal" value="${state.rm_tekrar}" placeholder="örn: 5" style="margin-top:4px"/>
      </div>
    </div>

    ${rm?`
    <div style="background:#000;border:1px solid #333;border-radius:14px;padding:16px;text-align:center;margin-bottom:12px;position:relative;overflow:hidden">
      <div style="position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,#ffffff0a,transparent 70%)"></div>
      <div style="font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px">${hareket}</div>
      <div style="font-size:52px;font-weight:700;line-height:1">${rm}</div>
      <div style="font-size:13px;color:#888;margin-top:4px">kg tahmini 1RM</div>
      ${pr&&rm>pr?`<div style="margin-top:8px;background:#0f2a0f;border:1px solid #4ade8066;border-radius:8px;padding:6px 12px;font-size:12px;color:#4ade80;display:inline-block">🏆 Yeni Kişisel Rekor!</div>`:""}
      ${pr?`<div style="margin-top:6px;font-size:11px;color:#555">Mevcut PR: ${pr} kg</div>`:""}
    </div>

    <button id="btn-rm-kaydet" style="width:100%;background:#fff;border:none;border-radius:12px;padding:12px;color:#000;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:12px">💾 PR Olarak Kaydet</button>

    <div style="border:1px solid #1a1a1a;border-radius:12px;overflow:hidden">
      <div style="padding:10px 14px;background:#0a0a0a;font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid #1a1a1a">Antrenman Ağırlık Tablosu</div>
      ${yuzdeTablosu(rm).map((r,i)=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;${i<8?"border-bottom:1px solid #111":""}">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:36px;height:36px;border-radius:8px;background:${r.pct===100?"#fff":r.pct>=90?"#e2e8f0":r.pct>=80?"#94a3b8":r.pct>=70?"#475569":"#1e293b"};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${r.pct>=80?"#000":"#fff"}">%${r.pct}</div>
          <div>
            <div style="font-size:13px;font-weight:600">${r.agirlik} kg</div>
            <div style="font-size:11px;color:#555">${r.pct===100?"Maksimum":r.pct>=90?"Güç":r.pct>=80?"Hipertrofi (az tekrar)":r.pct>=70?"Hipertrofi":r.pct>=60?"Dayanıklılık":"Isınma"}</div>
          </div>
        </div>
        <div style="font-size:11px;color:#555">${r.pct===100?"1":r.pct===95?"1-2":r.pct===90?"2-3":r.pct===85?"3-4":r.pct===80?"4-6":r.pct===75?"6-8":r.pct===70?"8-10":r.pct===65?"10-12":"12-15"} tekrar</div>
      </div>`).join("")}
    </div>`:`
    <div style="text-align:center;padding:24px;color:#444;font-size:13px">
      Ağırlık ve tekrar girerek 1RM hesapla
    </div>`}
  </div>

  ${gecmis.length>0?`
  <div class="card">
    <div class="card-title">🏆 Kişisel Rekorlar</div>
    ${HAZIR_HAREKETLER.filter(h=>gecmis.some(g=>g.hareket===h)).map(h=>{
      const enIyi=gecmis.filter(g=>g.hareket===h).sort((a,b)=>b.deger-a.deger)[0];
      return`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #111">
        <div>
          <div style="font-size:13px;font-weight:600">${h}</div>
          <div style="font-size:11px;color:#555;margin-top:2px">${enIyi.tarih}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:16px;font-weight:700">${enIyi.deger} kg</span>
          <button data-del-rm="${enIyi.id}" style="background:none;border:none;color:#f44;cursor:pointer;font-size:18px;padding:0 2px">×</button>
        </div>
      </div>`;
    }).join("")}
  </div>`:""}
  <div style="height:8px"></div>`;
}

// ── TAB 10: HAFTALIK RAPOR ────────────────────────────────────────────────────
function renderRapor(d){
  const streak=hesaplaStreak();
  const prSayisi=state.rm_gecmis.length;
  const sonOlcum=getSonOlcum();
  const bugunD=new Date();
  const haftaBaslangic=new Date(bugunD);
  haftaBaslangic.setDate(bugunD.getDate()-(bugunD.getDay()===0?6:bugunD.getDay()-1));
  haftaBaslangic.setHours(0,0,0,0);
  const haftaGiris=state.streakGunler.filter(g=>new Date(g)>=haftaBaslangic).length;
  const sek=state.raporAltSekme||"foto";
  const fotolar=state.fotograflar;

  const fotoHTML=`
  <div class="card">
    <div class="card-title">📸 Fotoğraf Ekle</div>
    <div style="margin-bottom:10px">
      <label class="lbl">Tarih</label>
      <input class="inp" type="date" id="foto-tarih" value="${new Date().toISOString().split("T")[0]}" style="margin-top:4px"/>
    </div>
    <label style="display:flex;align-items:center;justify-content:center;gap:10px;border:2px dashed #333;border-radius:12px;padding:24px;cursor:pointer;color:#777;font-size:14px;font-weight:600" for="foto-input">
      <span style="font-size:32px">📷</span><span>Fotoğraf seç veya çek</span>
      <input type="file" id="foto-input" accept="image/*" capture="environment" style="display:none"/>
    </label>
    <div id="foto-onizleme" style="margin-top:10px;display:none">
      <img id="foto-onizleme-img" style="width:100%;border-radius:10px;border:1px solid #333;max-height:260px;object-fit:cover"/>
      <button class="btn" id="btn-foto-kaydet" style="margin-top:8px">💾 Kaydet</button>
    </div>
  </div>
  ${fotolar.length>=2?`
  <div class="card">
    <div class="card-title">🔄 Önce / Sonra</div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <div style="flex:1"><label class="lbl">Önceki</label>
        <select class="inp" id="foto-once" style="margin-top:4px">${fotolar.map(f=>`<option value="${f.id}">${f.tarih}</option>`).join("")}</select>
      </div>
      <div style="flex:1"><label class="lbl">Sonraki</label>
        <select class="inp" id="foto-sonra" style="margin-top:4px">${[...fotolar].reverse().map(f=>`<option value="${f.id}">${f.tarih}</option>`).join("")}</select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" id="foto-karsilastir-wrap">
      <div style="text-align:center">
        <div style="font-size:10px;color:#555;margin-bottom:4px">${fotolar[0].tarih}</div>
        <img src="${fotolar[0].veri}" style="width:100%;border-radius:10px;border:1px solid #333;aspect-ratio:3/4;object-fit:cover"/>
      </div>
      <div style="text-align:center">
        <div style="font-size:10px;color:#555;margin-bottom:4px">${fotolar[fotolar.length-1].tarih}</div>
        <img src="${fotolar[fotolar.length-1].veri}" style="width:100%;border-radius:10px;border:1px solid #333;aspect-ratio:3/4;object-fit:cover"/>
      </div>
    </div>
  </div>`:""}
  ${fotolar.length>0?`
  <div class="card">
    <div class="card-title">🗂️ Tüm Fotoğraflar (${fotolar.length})</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
      ${[...fotolar].reverse().map(f=>`
      <div style="position:relative">
        <img src="${f.veri}" style="width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:8px;border:1px solid #222"/>
        <div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,#000c);border-radius:0 0 8px 8px;padding:4px;font-size:9px;color:#aaa;text-align:center">${f.tarih}</div>
        <button data-del-foto="${f.id}" style="position:absolute;top:4px;right:4px;background:#000c;border:none;border-radius:50%;width:22px;height:22px;color:#f44;cursor:pointer;font-size:16px;line-height:22px;text-align:center">×</button>
      </div>`).join("")}
    </div>
  </div>`:`
  <div class="card" style="text-align:center;padding:28px 16px">
    <div style="font-size:48px;margin-bottom:10px">📸</div>
    <div style="color:#555;font-size:13px">Henüz fotoğraf yok.<br>Yukarıdan ilk fotoğrafını ekle!</div>
  </div>`}`;

  const ozetHTML=`
  <div class="card">
    <div class="card-title">📊 Haftalık Özet</div>
    <div style="background:#000;border:1px solid #333;border-radius:16px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden">
      <div style="position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,#ffffff08,transparent)"></div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
        <div>
          <div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:2px">Haftalık Özet</div>
          <div style="font-size:16px;font-weight:700;margin-top:2px">${d.profil&&d.profil.ad||"Sporcu"} 💪</div>
          <div style="font-size:11px;color:#555;margin-top:1px">${new Date().toLocaleDateString("tr-TR",{day:"numeric",month:"long",year:"numeric"})}</div>
        </div>
        <div style="font-size:32px">🏋️</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
        ${[
          {ikon:"🔥",val:streak,lbl:"Gün Serisi"},
          {ikon:"📅",val:haftaGiris+"/7",lbl:"Bu Hafta"},
          {ikon:"📏",val:state.olcumGecmisi.length,lbl:"Ölçüm"},
          {ikon:"🏆",val:prSayisi,lbl:"PR"},
        ].map(s=>`<div style="background:#111;border-radius:10px;padding:12px;border:1px solid #1a1a1a">
          <div style="font-size:20px;margin-bottom:4px">${s.ikon}</div>
          <div style="font-size:20px;font-weight:700">${s.val}</div>
          <div style="font-size:10px;color:#555;margin-top:2px">${s.lbl}</div>
        </div>`).join("")}
      </div>
      <div style="background:#111;border-radius:10px;padding:12px;border:1px solid #1a1a1a">
        <div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Bugün</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${[
            {ikon:"🍽️",lbl:"Kalori",val:d.topKal+"/"+d.hedefKcal+" kcal",ok:d.topKal>0&&d.topKal<=d.hedefKcal},
            {ikon:"💧",lbl:"Su",val:state.suMl>=1000?(state.suMl/1000).toFixed(1)+"L":state.suMl+"ml",ok:state.suMl>=state.suHedef},
            {ikon:"👟",lbl:"Adım",val:state.adim.toLocaleString("tr-TR"),ok:state.adim>=state.adimHedef},
            {ikon:"😴",lbl:"Uyku",val:d.topUyu+"sa",ok:d.topUyu>=7},
          ].map(s=>`<div style="display:flex;align-items:center;gap:5px;background:#000;border-radius:8px;padding:6px 9px;border:1px solid ${s.ok?"#4ade8033":"#1a1a1a"}">
            <span style="font-size:14px">${s.ikon}</span>
            <div><div style="font-size:10px;color:#555">${s.lbl}</div><div style="font-size:12px;font-weight:600;color:${s.ok?"#4ade80":"#fff"}">${s.val}</div></div>
          </div>`).join("")}
        </div>
      </div>
      <div style="margin-top:12px;text-align:center;font-size:10px;color:#333;letter-spacing:1px">SAĞLIK TAKİBİ APP</div>
    </div>
    <button id="btn-rapor-indir" class="btn" style="margin-bottom:8px">📸 Ekran Görüntüsü Al</button>
    <div style="font-size:11px;color:#555;text-align:center;margin-bottom:12px">Kartın ekran görüntüsünü alarak paylaşabilirsin</div>
    <button id="btn-rapor-kopyala" class="btn btn-outline">📋 Metin Özetini Kopyala</button>
    <div id="kopyala-bilgi" style="display:none;margin-top:8px;background:#0f2a0f;border:1px solid #4ade8066;border-radius:8px;padding:8px 12px;text-align:center;font-size:12px;color:#4ade80">✅ Panoya kopyalandı!</div>
  </div>`;

  return`
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <button id="btn-rapor-sekme-foto" style="flex:1;padding:12px;border-radius:12px;border:1px solid ${sek==="foto"?"#fff":"#222"};background:${sek==="foto"?"#fff":"#000"};color:${sek==="foto"?"#000":"#555"};cursor:pointer;font-weight:700;font-size:14px">📸 Fotoğraflar</button>
    <button id="btn-rapor-sekme-ozet" style="flex:1;padding:12px;border-radius:12px;border:1px solid ${sek==="ozet"?"#fff":"#222"};background:${sek==="ozet"?"#fff":"#000"};color:${sek==="ozet"?"#000":"#555"};cursor:pointer;font-weight:700;font-size:14px">📊 Özet</button>
  </div>
  ${sek==="foto"?fotoHTML:ozetHTML}
  <div style="height:8px"></div>`;
}

// ── BAŞLAT ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
